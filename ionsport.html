<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>イオンスポーツクラブ MEOダッシュボード 2026年4月</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --navy: #1B2B4B;
    --navy2: #0F1E38;
    --teal: #00A896;
    --teal2: #007A6E;
    --light: #F4F7FB;
    --white: #FFFFFF;
    --gray: #64748B;
    --gray2: #94A3B8;
    --darkGray: #334155;
    --border: #E2E8F0;
    --green: #10B981;
    --red: #EF4444;
    --orange: #F59E0B;
    --other-co: #F59E0B;
    --other-co-bg: #FEF3C7;
    --untrans: #94A3B8;
    --untrans-bg: #F1F5F9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'メイリオ', Meiryo, sans-serif; background: var(--light); color: var(--navy); font-size: 13px; }

  /* ─── HEADER ─── */
  .header {
    background: var(--navy2);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    border-bottom: 2px solid var(--teal);
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
  }
  .logo-gendai {
    display: flex; align-items: center; gap: 6px;
  }
  .logo-dot {
    width: 14px; height: 14px; border-radius: 50%;
    background: #1565C0; flex-shrink: 0;
  }
  .logo-gendai span {
    font-size: 13px; color: #fff; font-weight: 700;
    letter-spacing: 0.5px;
  }
  .logo-x {
    color: var(--navy2); font-weight: 900; font-size: 14px;
    background: #fff; padding: 2px 5px; border-radius: 3px;
  }
  .logo-h2 {
    font-size: 14px; font-weight: 900; color: #FF6B00;
    letter-spacing: 0.5px;
  }
  .header-right {
    display: flex; align-items: center; gap: 12px;
  }
  .report-period {
    font-size: 11px; color: var(--gray2);
  }

  /* ─── TAB SWITCH ─── */
  .tab-bar {
    background: var(--navy2);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 2px solid rgba(255,255,255,0.08);
    position: sticky;
    top: 56px;
    z-index: 99;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  .tab-bar-label {
    font-size: 10px; color: #64748B; letter-spacing: 1px;
    text-transform: uppercase; font-weight: 600;
    margin-right: 4px; white-space: nowrap;
  }
  .tab-btn {
    padding: 9px 22px;
    border: 2px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: #94A3B8;
    font-family: inherit; font-size: 13px;
    font-weight: 700; cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
    white-space: nowrap;
  }
  .tab-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.3);
    color: #fff;
    transform: translateY(-1px);
  }
  .tab-btn.active {
    background: var(--teal);
    border-color: var(--teal);
    color: #fff;
    box-shadow: 0 4px 14px rgba(0,168,150,0.4);
  }
  .tab-btn .tab-count {
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    font-size: 10px; font-weight: 800;
    padding: 1px 7px;
    line-height: 1.4;
  }
  .tab-btn.active .tab-count {
    background: rgba(255,255,255,0.25);
    color: #fff;
  }
  .tab-sep { display: none; }

  /* ─── MAIN LAYOUT ─── */
  .main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }
  .section-title {
    font-size: 12px; font-weight: 700; color: var(--gray); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before {
    content: ''; display: block;
    width: 3px; height: 14px; background: var(--teal); border-radius: 2px;
  }

  /* ─── KPI CARDS ─── */
  .kpi-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;
    margin-bottom: 20px;
  }
  .kpi-card {
    background: var(--white); border-radius: 10px;
    border: 1px solid var(--border);
    padding: 16px 16px 14px;
    position: relative; overflow: hidden;
  }
  .kpi-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px; background: var(--teal);
  }
  .kpi-card.goal::before { background: linear-gradient(90deg, var(--teal), var(--green)); }
  .kpi-label { font-size: 10px; color: var(--gray); font-weight: 600; margin-bottom: 6px; }
  .kpi-val { font-size: 26px; font-weight: 700; color: var(--navy); line-height: 1; }
  .kpi-val span { font-size: 12px; font-weight: 400; color: var(--gray); margin-left: 2px; }
  .kpi-sub { font-size: 11px; margin-top: 6px; }
  .kpi-up { color: var(--green); font-weight: 700; }
  .kpi-down { color: var(--red); font-weight: 700; }
  .kpi-neutral { color: var(--gray); }

  /* ─── TARGET PROGRESS ─── */
  .target-section { margin-bottom: 20px; }
  .target-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .target-card {
    background: var(--white); border-radius: 10px;
    border: 1px solid var(--border); padding: 14px 18px;
  }
  .target-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .target-name { font-size: 12px; font-weight: 700; color: var(--navy); }
  .target-status {
    font-size: 10px; font-weight: 700; padding: 2px 8px;
    border-radius: 10px;
  }
  .status-achieved { background: #D1FAE5; color: #065F46; }
  .status-progress { background: #FEF3C7; color: #92400E; }
  .status-below { background: #FEE2E2; color: #991B1B; }
  .progress-row {
    display: grid; grid-template-columns: 90px 1fr 90px;
    gap: 10px; align-items: center; margin-bottom: 6px;
  }
  .progress-label { font-size: 10px; color: var(--gray); text-align: right; }
  .progress-bar-wrap { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
  .progress-bar.teal { background: var(--teal); }
  .progress-bar.green { background: var(--green); }
  .progress-bar.orange { background: var(--orange); }
  .progress-val { font-size: 10px; font-weight: 700; color: var(--navy); }

  /* ─── CHARTS ─── */
  .charts-grid { display: grid; grid-template-columns: 3fr 2fr; gap: 14px; margin-bottom: 20px; }
  .chart-card {
    background: var(--white); border-radius: 10px;
    border: 1px solid var(--border); padding: 16px;
  }
  .chart-title {
    font-size: 12px; font-weight: 700; color: var(--navy); margin-bottom: 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .chart-legend {
    display: flex; gap: 12px; font-size: 10px; color: var(--gray);
  }
  .legend-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px;
  }
  .chart-wrap { position: relative; }

  /* ─── STORE TABLE ─── */
  .table-card {
    background: var(--white); border-radius: 10px;
    border: 1px solid var(--border); margin-bottom: 20px;
    overflow: hidden;
  }
  .table-header {
    padding: 14px 18px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th {
    background: #F8FAFC; padding: 9px 12px; text-align: right;
    font-size: 10px; font-weight: 700; color: var(--gray);
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  th:first-child { text-align: left; }
  td {
    padding: 8px 12px; text-align: right;
    border-bottom: 1px solid #F1F5F9; white-space: nowrap;
  }
  td:first-child { text-align: left; font-weight: 600; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #FAFBFF; }
  .badge {
    display: inline-block; font-size: 9px; font-weight: 700;
    padding: 1px 6px; border-radius: 8px; margin-left: 4px;
    vertical-align: middle;
  }
  .badge-other { background: var(--other-co-bg); color: #92400E; }
  .badge-untrans { background: var(--untrans-bg); color: var(--gray); }
  .up { color: var(--green); font-weight: 700; }
  .down { color: var(--red); font-weight: 700; }
  .neutral { color: var(--gray); }
  .row-other td { background: #FFFBEB; }
  .row-untrans td { background: #F8FAFC; color: #94A3B8; }

  /* ─── KEYWORD SECTION ─── */
  .kw-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .kw-card { background: var(--white); border-radius: 10px; border: 1px solid var(--border); padding: 16px; }
  .kw-title { font-size: 12px; font-weight: 700; color: var(--navy); margin-bottom: 10px; }
  .kw-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; border-bottom: 1px solid #F1F5F9;
  }
  .kw-item:last-child { border-bottom: none; }
  .kw-name { font-size: 12px; color: var(--navy); font-weight: 500; }
  .kw-right { text-align: right; }
  .kw-count { font-size: 13px; font-weight: 700; color: var(--navy); }
  .kw-yoy { font-size: 10px; font-weight: 700; margin-top: 1px; }
  .kw-bar-wrap { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 3px; min-width: 80px; }
  .kw-bar { height: 100%; background: var(--teal); border-radius: 2px; }

  /* ─── REVIEW SECTION ─── */
  .review-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .review-card {
    background: var(--white); border-radius: 10px; border: 1px solid var(--border);
    padding: 14px; text-align: center;
  }
  .review-card .store-name { font-size: 11px; color: var(--gray); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .review-stars { font-size: 16px; margin-bottom: 4px; }
  .review-score { font-size: 22px; font-weight: 700; color: var(--navy); }
  .review-count { font-size: 10px; color: var(--gray); margin-top: 2px; }
  .review-new { font-size: 11px; font-weight: 700; color: var(--teal); margin-top: 3px; }

  /* ─── SECTION DIVIDER ─── */
  .divider { height: 1px; background: var(--border); margin: 6px 0 18px; }

  /* ─── OTHER CO BANNER ─── */
  .other-co-note {
    background: #FEF3C7; border: 1px solid #F59E0B; border-radius: 8px;
    padding: 10px 14px; font-size: 11px; color: #78350F;
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .untrans-note {
    background: #F1F5F9; border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; font-size: 11px; color: var(--gray);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }

  /* ─── FOOTER ─── */
  .footer {
    text-align: center; padding: 16px; font-size: 10px; color: var(--gray2);
    border-top: 1px solid var(--border);
  }

  /* ─── SECTION TOGGLE ─── */
  .view { display: none; }
  .view.active { display: block; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 1100px) {
    .kpi-grid { grid-template-columns: repeat(3, 1fr); }
    .charts-grid { grid-template-columns: 1fr; }
    .kw-grid { grid-template-columns: 1fr 1fr; }
    .review-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>

// ─── TABLE BUILDER ─────────────────────────────────────────────────────────

function buildTable(stores, tbodyId) {
  const tbody = document.getElementById(tbodyId);
  if (!tbody) return;
  const sorted = [...stores].sort((a,b) => b.ar25 - a.ar25);
  sorted.forEach(s => {
    const yoy_d = s.d24>0 ? ((s.d25-s.d24)/s.d24*100) : null;
    const yoy_ar = (s.ar25-s.ar24);
    const cls = s.other ? 'row-other' : (s.untrans ? 'row-untrans' : '');
    const badge = s.other ? '<span class="badge badge-other">他社対応</span>' :
                  (s.untrans ? '<span class="badge badge-untrans">譲渡未完了</span>' : '');
    const yoyHtml = yoy_d===null ? '<span class="neutral">NEW</span>' :
      yoy_d>0 ? `<span class="up">+${yoy_d.toFixed(1)}%</span>` :
                `<span class="down">${yoy_d.toFixed(1)}%</span>`;
    const arHtml = yoy_ar>0 ? `<span class="up">+${yoy_ar.toFixed(1)}pt</span>` :
                              `<span class="down">${yoy_ar.toFixed(1)}pt</span>`;
    const rank = s.rank !== undefined ? s.rank : null;
    const rankHtml = rank === null ? '−' :
      rank >= 50 ? `<span style="color:#10B981;font-weight:700">${rank}%</span>` :
      rank >= 20 ? `<span style="color:#F59E0B;font-weight:600">${rank}%</span>` :
                   `<span style="color:#EF4444;font-weight:700">${rank}%</span>`;
    const yr2 = s.review.mar !== undefined ? s.review.mar : (s.review.yr2 || s.review.period || 0);
    const scoreColor = s.review.score >= 4 ? '#F59E0B' : s.review.score >= 3 ? '#64748B' : '#EF4444';
    tbody.innerHTML += `
      <tr class="${cls}" title="${s.addr||''}">
        <td>${s.name}${badge}</td>
        <td>${s.d24.toLocaleString()}</td>
        <td>${s.d25.toLocaleString()}</td>
        <td>${yoyHtml}</td>
        <td>${s.ar24.toFixed(1)}%</td>
        <td>${s.ar25.toFixed(1)}%</td>
        <td>${arHtml}</td>
        <td>${rankHtml}</td>
        <td>${s.review.total}<span style="font-size:9px;color:#94A3B8">（2年）</span></td>
        <td style="font-weight:${yr2>0?'700':'400'};color:${yr2>0?'var(--navy)':'#94A3B8'}">${yr2}</td>
        <td style="color:${scoreColor}">${s.review.score>0?s.review.score.toFixed(1):'−'}</td>
      </tr>`;
  });
}

function buildKw(kwList, containerId) {
  const maxV = Math.max(...kwList.map(k=>k.fy25));
  const el = document.getElementById(containerId);
  el.innerHTML = kwList.map(k => {
    const pct = Math.round(k.fy25/maxV*100);
    const yoyHtml = k.yoy === null || k.yoy === undefined ? '<div class="kw-yoy neutral">−</div>' :
                   k.yoy > 0 ? `<div class="kw-yoy up">+${k.yoy.toFixed(0)}%</div>` :
                   k.yoy === 0 ? `<div class="kw-yoy neutral">±0%</div>` :
                                 `<div class="kw-yoy down">${k.yoy.toFixed(0)}%</div>`;
    return `<div class="kw-item">
      <div>
        <div class="kw-name">${k.name}</div>
        <div class="kw-bar-wrap"><div class="kw-bar" style="width:${pct}%"></div></div>
      </div>
      <div class="kw-right">
        <div class="kw-count">${k.fy25.toLocaleString()}</div>
        ${yoyHtml}
      </div>
    </div>`;
  }).join('');
}

const MONTHS_CONFIG = [
  { key:'2026-04', label:'2026年4月', period:'2024年5月〜2026年4月', active:true  },
  { key:'2026-05', label:'2026年5月', period:'2024年6月〜2026年5月', active:false },
  { key:'2026-06', label:'2026年6月', period:'2024年7月〜2026年6月', active:false },
];
let currentMonth = '2026-04';

function buildMonthButtons() {
  const container = document.getElementById('month-btns');
  if (!container) return;
  container.innerHTML = MONTHS_CONFIG.map(m => `
    <button onclick="selectMonth('${m.key}')" id="mbtn-${m.key}"
      style="padding:5px 16px;border-radius:20px;border:1px solid ${m.key===currentMonth?'var(--teal)':'rgba(255,255,255,0.15)'};
             background:${m.key===currentMonth?'var(--teal)':'transparent'};
             color:${m.key===currentMonth?'#fff':m.active?'#CBD5E1':'#4A5568'};
             font-family:inherit;font-size:12px;font-weight:${m.key===currentMonth?'700':'500'};
             cursor:${m.active?'pointer':'default'};white-space:nowrap;position:relative">
      ${m.label}
      ${!m.active ? '<span style="position:absolute;top:-6px;right:-4px;background:#4A5568;color:#94A3B8;font-size:8px;padding:1px 5px;border-radius:6px">準備中</span>' : ''}
    </button>`).join('');
}

function selectMonth(key) {
  const cfg = MONTHS_CONFIG.find(m => m.key === key);
  if (!cfg || !cfg.active) return;
  currentMonth = key;
  buildMonthButtons();
  const badge = document.getElementById('cover-month-badge');
  const period = document.getElementById('cover-period');
  const headerPeriod = document.getElementById('header-period');
  if (badge) badge.textContent = cfg.label + '度';
  if (period) period.textContent = '集計期間：' + cfg.period;
  if (headerPeriod) headerPeriod.textContent = 'MEO Dashboard ／ 集計期間：' + cfg.period;
  // 将来：月データ切り替え処理をここに追加
  // reloadMonthData(key);
}

// ─── TAB SWITCH ────────────────────────────────────────────────────────────

function switchView(view) {
  // tab-contentにHTMLを差し込む（確実に一方のみ表示）
  const container = document.getElementById('tab-content');
  if (!container || !TAB_HTML[view]) return;
  container.innerHTML = TAB_HTML[view];
  // 注入した外側divのdisplay:noneを解除
  const injected = container.firstElementChild;
  if (injected) injected.style.display = 'block';

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const cover = document.getElementById('view-cover');
  const mbar  = document.getElementById('month-bar');
  const tbar  = document.querySelector('.tab-bar');
  const main  = document.querySelector('.main');
  if (cover) cover.style.display = 'none';
  if (mbar)  mbar.style.display  = 'flex';
  if (tbar)  tbar.style.display  = 'flex';
  if (main)  main.style.display  = 'block';
  const tabBtn = document.getElementById('tab-' + view);
  if (tabBtn) tabBtn.classList.add('active');

  // chartsInited をリセット（innerHTML置き換えでcanvas再生成のため）
  chartsInited = false;
  // テーブル・KW・ワーストを再構築
  if (view === 'tokka') {
    buildTable(TOKKA_STORES, 'tokka-tbody');
    buildKw(KW_GYM,   'kw-gym');
    buildKw(KW_POOL,  'kw-pool');
    buildKw(KW_BRAND, 'kw-brand');
    buildWorstCards();
  } else {
    buildTable(SOGO_STORES,  'sogo-tbody');
    buildKw(KW_GYM_SOGO_DATA,   'kw-gym-sogo');
    buildKw(KW_POOL_SOGO_DATA,  'kw-pool-sogo');
    buildKw(KW_BRAND_SOGO_DATA, 'kw-brand-sogo');
    buildWorstCardsSogo();
  }
  setTimeout(initCharts, 80);
}

function showCover() {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-cover').style.display = 'block';
  document.getElementById('month-bar').style.display = 'none';
  document.querySelector('.tab-bar').style.display = 'none';
  document.querySelector('.main').style.display = 'none';
}

function closeCover() {
  document.getElementById('view-cover').style.display = 'none';
  switchView('tokka');
}

// ─── INIT ──────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  showCover();
  buildMonthButtons();
  // switchViewが各タブのHTML・テーブル・KW・ワーストを生成するため、ここでの個別呼び出し不要
});
